name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [ "eduplay-gateway", "eduplay-user" ]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run linter
        working-directory: ${{ matrix.service }}
        run: golangci-lint run --path-prefix=${{ matrix.service }} --timeout=5m

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: go test ./... -v

      - name: Build service
        working-directory: ${{ matrix.service }}
        run: go build ./...
