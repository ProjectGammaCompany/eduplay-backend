message SignUpOut {
    string accessToken = 1;
    string refreshToken = 2;
    string errorMessage = 3;
    // Role role = 3; 
    // int64 accessLevel = 4;
    // string errorMessage = 5;
}

message RefreshIn {
    string refreshToken = 1;
}

message RefreshOut {
    string accessToken = 1;
    string refreshToken = 2;
    string message = 3;
}

