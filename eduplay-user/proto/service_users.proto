syntax = "proto3";

package user_data; 

option go_package = "eduplay-user.v1";

service Users {
    rpc SignUp(SignUpIn) returns (SignUpOut);
    rpc SignIn(SignInIn) returns (SignUpOut);
    rpc Refresh(RefreshIn) returns (RefreshOut);
    rpc PutAvatar(Profile) returns (Empty);
    rpc PutUsername(Profile) returns (Empty);
    rpc SendVerificationCode(Id) returns (MessageOut);
    rpc GetVerificationCode(Id) returns (MessageOut);
    rpc ChangePassword(ChangePasswordIn) returns (SignUpOut);
    // rpc GetUserAccess (GetUserAccessIn) returns (GetUserAccessOut);
    // rpc GetUserInfo (GetUserAccessIn) returns (GetUserInfoOut);
    // rpc ChangeUserInfo (ChangeUserInfoIn) returns (GetUserInfoOut);
    rpc DeleteAccount(DeleteAccountIn) returns (Empty);
    rpc SignOut(DeleteAccountIn) returns (Empty);
    rpc GetProfile(Id) returns (Profile);
    rpc GetProfileByLogin(Id) returns (Profile);
}

message Empty{}

message MessageOut {
    string message = 1;
}

message Id {
    string id = 1;
}

message SignUpIn {
    // string name = 1;
    // string surname = 2; 
    // string email = 3;
    // string organization = 4;
    // string phone = 5;
    // string password = 6;
    string email = 1;
    string password = 2;
}

message SignInIn {
    string email = 1; 
    string password = 2;
}

// enum Role {
