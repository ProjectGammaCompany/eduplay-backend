apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eduplay-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/cactus91869/backend.git
    targetRevision: main
    path: k8s/app

  destination:
    server: https://kubernetes.default.svc
    namespace: eduplay

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
