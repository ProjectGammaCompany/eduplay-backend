apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eduplay-gateway
  namespace: eduplay
spec:
  rules:
  - host: api.hse-eduplay.ru
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eduplay-gateway
            port:
              number: 80
