apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eduplay
  namespace: eduplay
  annotations: 
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/redirect-entry-point: websecure
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - hse-eduplay.ru
    - api.hse-eduplay.ru
    secretName: eduplay-tls
  rules:
  - host: hse-eduplay.ru
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eduplay-frontend
            port:
              number: 8080
  - host: api.hse-eduplay.ru
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: eduplay-gateway
            port:
              number: 80

